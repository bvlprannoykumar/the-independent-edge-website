# netlify.toml
# Clean URL configuration for The Independent Edge

[build]
  publish = "."

# Pretty URLs: serve <slug>.html at /<slug>
[[redirects]]
  from = "/work-with-me"
  to = "/work-with-me.html"
  status = 200

[[redirects]]
  from = "/the-weekly-edge"
  to = "/the-weekly-edge.html"
  status = 200

[[redirects]]
  from = "/apply"
  to = "/apply.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

# Trailing slash -> canonical (no slash)
[[redirects]]
  from = "/work-with-me/"
  to = "/work-with-me"
  status = 301

[[redirects]]
  from = "/the-weekly-edge/"
  to = "/the-weekly-edge"
  status = 301

[[redirects]]
  from = "/apply/"
  to = "/apply"
  status = 301

[[redirects]]
  from = "/about/"
  to = "/about"
  status = 301

[[redirects]]
  from = "/privacy/"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/terms/"
  to = "/terms"
  status = 301

# .html -> clean URL (avoid duplicate content)
[[redirects]]
  from = "/work-with-me.html"
  to = "/work-with-me"
  status = 301

[[redirects]]
  from = "/the-weekly-edge.html"
  to = "/the-weekly-edge"
  status = 301

[[redirects]]
  from = "/apply.html"
  to = "/apply"
  status = 301

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/terms.html"
  to = "/terms"
  status = 301

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache the founder image aggressively (it does not change)
[[headers]]
  for = "/prannoy-kumar-founder.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-default.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
